<!-- Floating Info Box -->
<div id="floatingBox" class="floating-info-box">
  Loading...
</div>

<script src="/js/epiweek.js"></script>
<script>
(function () {
  function update() {
    var box = document.getElementById('floatingBox');
    if (!box) return;
    var now = new Date();
    var formattedDate = now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    var formattedTime = now.toLocaleTimeString();
    var info = window.StudyStats.getEpiWeek(now);
    var weekStartStr = info.weekStart.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    var weekEndStr = info.weekEnd.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    box.innerHTML =
      '<strong>' + formattedDate + '</strong><br>' +
      'Time: ' + formattedTime + '<br>' +
      'CDC Epiweek: ' + info.epiWeek + ' (' + info.epiYear + ')<br>' +
      '(' + weekStartStr + ' – ' + weekEndStr + ')';
  }
  document.addEventListener('DOMContentLoaded', update);
})();
</script>

</body>
</html>
